<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Agentoro - Connect</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md text-center">
        <h1 class="text-2xl font-bold text-blue-600 mb-6">Agentoro Tech</h1>
        
        <div id="login-section">
            <button onclick="loginWithFacebook()" class="bg-[#1877F2] text-white px-6 py-3 rounded-lg font-bold w-full">
                Connect with Facebook
            </button>
        </div>

        <div id="selection-section" class="hidden">
            <h2 class="mb-4 font-bold">اختر حسابك:</h2>
            <div id="accounts-list" class="space-y-2"></div>
        </div>
    </div>

    <script>
        window.fbAsyncInit = function() {
            FB.init({ appId: '1435934461170151', cookie: true, xfbml: true, version: 'v20.0' });
        };

        (function(d, s, id){
            var js, fjs = d.getElementsByTagName(s)[0];
            if (d.getElementById(id)) return;
            js = d.createElement(s); js.id = id;
            js.src = "https://connect.facebook.net/en_US/sdk.js";
            fjs.parentNode.insertBefore(js, fjs);
        }(document, 'script', 'facebook-jssdk'));

        function loginWithFacebook() {
            FB.login(function(response) {
                if (response.authResponse) fetchAccounts();
            }, {
                scope: 'public_profile,instagram_basic,pages_show_list,instagram_manage_messages',
                auth_type: 'rerequest'
            });
        }

        function fetchAccounts() {
            // جلب الصفحات وحسابات الانستغرام المرتبطة بها
            FB.api('/me/accounts?fields=name,instagram_business_account{id,username,profile_picture_url}', function(response) {
                const list = document.getElementById('accounts-list');
                list.innerHTML = '';
                let found = false;

                if (response.data) {
                    response.data.forEach(page => {
                        if (page.instagram_business_account) {
                            found = true;
                            const ig = page.instagram_business_account;
                            const item = document.createElement('div');
                            item.className = "p-3 border rounded-lg cursor-pointer hover:bg-blue-50 flex items-center gap-3";
                            item.onclick = () => alert('تم اختيار: ' + ig.username);
                            item.innerHTML = `
                                <img src="${ig.profile_picture_url}" class="w-10 h-10 rounded-full">
                                <div class="text-right">
                                    <p class="font-bold">${ig.username}</p>
                                    <p class="text-xs text-gray-500">عبر صفحة: ${page.name}</p>
                                </div>
                            `;
                            list.appendChild(item);
                        }
                    });
                }

                if (found) {
                    document.getElementById('login-section').classList.add('hidden');
                    document.getElementById('selection-section').classList.remove('hidden');
                } else {
                    alert("لم نجد حساب إنستغرام احترافي مرتبط بصفحة فيسبوك. تأكد من الربط في إعدادات الصفحة.");
                }
            });
        }
    </script>
</body>
</html>
